name: Build Android APK

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            ccache

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip

          pip install \
            buildozer==1.5.0 \
            Cython==0.29.36 \
            python-for-android==2024.01.21

      - name: Install Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-6514223_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q commandlinetools-linux-6514223_latest.zip \
            -d $HOME/android-sdk/cmdline-tools
          mv \
            $HOME/android-sdk/cmdline-tools/tools \
            $HOME/android-sdk/cmdline-tools/latest
          
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653"

      - name: Clean Previous Build
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -rf build

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          ANDROID_HOME: ${{ github.workspace }}/../android-sdk
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$PATH:$ANDROID_HOME/platform-tools
          
          echo "Python version: $(python --version)"
          echo "Java version: $(java -version)"
          
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FallGuard-APK
          path: bin/*.apk